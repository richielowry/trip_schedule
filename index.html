<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lord Lowry Schedule</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --bg: #f3f4f6;
  --card: #ffffff;
  --trip: #1d4ed8;
  --event: #15803d;
  --holiday: #b45309;
  --text: #111827;
  --muted: #6b7280;
  --shadow: 0 4px 12px rgba(0,0,0,0.06);
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  padding: 20px 14px 60px;
  color: var(--text);
}

h1 {
  text-align: center;
  font-weight: 700;
  margin-bottom: 25px;
}

.table-header {
  display: grid;
  grid-template-columns: 2fr 1.2fr 0.8fr 0.8fr;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  padding: 0 6px 8px 6px;
}

.card {
  background: var(--card);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 8px;
  box-shadow: var(--shadow);
}

.row {
  display: grid;
  grid-template-columns: 2fr 1.2fr 0.8fr 0.8fr;
  align-items: center;
  font-size: 14px;
}

.title {
  font-weight: 600;
}

.trip {
  color: var(--trip);
  font-size: 15px;
}

.event {
  color: var(--event);
}

.holiday {
  color: var(--holiday);
}

.countdown {
  font-weight: 600;
}
</style>
</head>

<body>

<h1>Lord Lowry</h1>

<div class="table-header">
  <div>Event</div>
  <div>Date</div>
  <div>C'down</div>
  <div>Duration</div>
</div>

<div id="events"></div>

<script>

const DATA_URL = "https://raw.githubusercontent.com/richielowry/schedule-cache/main/schedule.json";

function formatSingleDate(date) {
  const days = ["Sun","Mon","Tues","Wed","Thur","Fri","Sat"];
  const dayName = days[date.getDay()];
  const datePart = date.toDateString().slice(4,10);
  return dayName + " " + datePart;
}

function daysBetween(a,b) {
  return Math.ceil((b - a)/(1000*60*60*24));
}

function overlaps(trip, holidayDate) {
  return holidayDate >= trip.start && holidayDate <= trip.end;
}

function render(data) {

  const container = document.getElementById("events");
  container.innerHTML = "";

  const now = new Date();
  const futureLimit = new Date();
  futureLimit.setMonth(now.getMonth() + 12);

  const calendarItems = data.calendarItems.map(e => ({
    ...e,
    start: new Date(e.start),
    end: new Date(e.end)
  }));

  const holidays = data.holidays.map(h => ({
    ...h,
    start: new Date(h.date),
    end: new Date(h.date)
  }));

  let combined = [];
  const tripsOnly = calendarItems.filter(e => e.type==="trip");

  calendarItems.forEach(e => {
    if (e.start >= now && e.start <= futureLimit) {
      combined.push(e);
    }
  });

  holidays.forEach(h => {
    const date = h.start;

    if (date >= now && date <= futureLimit) {

      const conflict = tripsOnly.some(t => overlaps(t,date));

      if (!conflict) {
        combined.push({
          type:"holiday",
          title:h.name,
          start:date,
          end:date
        });
      }

    }
  });

  combined.sort((a,b)=>a.start - b.start);

  combined.forEach(e=>{

    const card = document.createElement("div");
    card.className="card";

    const row = document.createElement("div");
    row.className="row";

    const title = document.createElement("div");
    title.className="title "+e.type;

    if (e.type==="trip") title.textContent = "✈️ " + e.title;
    else if (e.type==="event") title.textContent = "🎂 " + e.title;
    else title.textContent = "🇮🇪 " + e.title;

    const date = document.createElement("div");

    if (e.start.getTime() !== e.end.getTime()) {

      date.textContent =
        e.start.toDateString().slice(4,10) +
        " – " +
        e.end.toDateString().slice(4,10);

    } else {

      date.textContent = formatSingleDate(e.start);

    }

    const countdown = document.createElement("div");
    countdown.className="countdown";
    countdown.textContent = daysBetween(now,e.start)+"d";

    const duration = document.createElement("div");

    if (e.type==="trip") {
      duration.textContent = (daysBetween(e.start,e.end)+1)+"d";
    } else {
      duration.textContent = "-";
    }

    row.appendChild(title);
    row.appendChild(date);
    row.appendChild(countdown);
    row.appendChild(duration);

    card.appendChild(row);
    container.appendChild(card);

  });

}

fetch(DATA_URL)
  .then(r => r.json())
  .then(render);

</script>

</body>
</html>
